# Alembic configuration file
# The database URL is overridden at runtime by alembic/env.py (reads from .env)

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# placeholder — overridden by env.py
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/hackathon_db

[post_write_hooks]
# hooks.type = exec
# hooks.executable = ruff
# hooks.options = --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
